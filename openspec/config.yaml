schema: spec-driven

context: |
  Tech stack: pnpm+Turborepo monorepo, Next.js 15 App Router, PostgreSQL/Drizzle, Tailwind CSS 4, TypeScript strict
  Architecture: Clean Architecture with packages/domain, packages/infrastructure, apps/web
  Target: Ecuadorian market, small business management (POS, inventory, SRI invoicing)
  Design: Mobile-first, @google/design.md tokens, task-oriented UI

strict_tdd: false

artifact_store: hybrid

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow Clean Architecture boundaries
    - Domain layer MUST have zero external dependencies
  verify:
    - Run tests if test infrastructure exists
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas
